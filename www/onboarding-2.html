<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Onboarding 2 | Disciplina</title>
    <meta name="theme-color" content="#e9eefb" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="onb-body onb2v2-body">
    <main class="onb2v2-shell">
      <header class="onb2v2-top">
        <a class="onb-back onb2v2-back" href="onboarding-1.html" aria-label="Atras">&lt;</a>
        <div class="onb-dots onb2v2-dots">
          <span class="onb-dot"></span><span class="onb-dot active"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span>
        </div>
        <span class="onb2v2-spacer" aria-hidden="true"></span>
      </header>

      <section class="onb2v2-stage">
        <article class="onb2v2-card">
          <img class="onb2v2-bg" src="assets/extras/onb2-woman.png" alt="Domina tu nutricion" loading="lazy" />
          <div class="onb2v2-shade" aria-hidden="true"></div>

          <div class="onb2v2-content">
            <p class="onb2v2-mantra">
              ME RESPETO<br />
              ME ALIMENTO<br />
              ME CUIDO<br />

            </p>

            <h1 class="onb2v2-title">
              DOMINA<br />
              <span>TU NUTRICION</span>
            </h1>

            <p class="onb2v2-copy">Controla tus calorias y construye disciplina diaria.</p>

            <ul class="onb2v2-list">
              <li class="fire">Registro rapido</li>
              <li class="apple">Control calorias</li>
              <li class="bolt">Disciplina diaria</li>
            </ul>

            <a class="onb2v2-btn" href="onboarding-3.html">
              <strong>SIGUIENTE</strong>
              <span>Empieza a cuidarte</span>
            </a>

            <div class="onb2v2-mini-dots" aria-hidden="true">
              <span></span><span></span><span></span><span class="active"></span><span></span><span></span><span></span><span></span>
            </div>
          </div>
        </article>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
