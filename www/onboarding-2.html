<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Paso 2 | Momentum Ascent</title>
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="onb-dark-body">
    <div class="noise"></div>
    <div class="stars"></div>
    <main class="onb-shell">
      <header class="onb-header">
        <a class="onb-back-btn" href="onboarding-1.html" aria-label="Atras">←</a>
        <div class="onb-progress-wrap"><div class="onb-progress-bar" style="width:22%"></div></div>
        <span class="onb-step-label">2/9</span>
      </header>

      <div class="onb-hero">
        <img src="assets/extras/extra-02.jpeg" alt="Punto de partida" loading="eager" />
        <div class="onb-hero-overlay"></div>
        <div class="onb-hero-label">
          <h1>TU PUNTO<br />DE PARTIDA</h1>
          <p>Sé honesto. Sin juicios aquí.</p>
        </div>
      </div>

      <div class="onb-content">
        <p class="onb-eyebrow">Paso 2 — Diagnóstico</p>
        <h1 class="onb-title">¿Cuánto llevas <span>sin constancia?</span></h1>
        <p class="onb-sub">Necesitamos saber tu punto de partida real para darte el plan correcto.</p>

        <p class="onb-section-label">¿Cuánto tiempo llevas sin entrenar seguido?</p>
        <div class="onb-options grid-2" data-onb-key="gap_entreno" data-onb-type="single" data-onb-required="true">
          <button class="onb-option" type="button" data-onb-value="Menos de 1 mes">
            <span class="onb-option-icon">✅</span>
            <span class="onb-option-label">Menos de 1 mes</span>
          </button>
          <button class="onb-option" type="button" data-onb-value="1 a 3 meses">
            <span class="onb-option-icon">📅</span>
            <span class="onb-option-label">1 a 3 meses</span>
          </button>
          <button class="onb-option" type="button" data-onb-value="3 a 6 meses">
            <span class="onb-option-icon">⏳</span>
            <span class="onb-option-label">3 a 6 meses</span>
          </button>
          <button class="onb-option" type="button" data-onb-value="Mas de 6 meses">
            <span class="onb-option-icon">💀</span>
            <span class="onb-option-label">Más de 6 meses</span>
          </button>
        </div>

        <p class="onb-section-label">¿Con qué frecuencia entrenabas antes?</p>
        <div class="onb-options grid-chips" data-onb-key="frecuencia_previa" data-onb-type="single" data-onb-required="true">
          <button class="onb-option chip" type="button" data-onb-value="Nunca entrene">🚫 Nunca</button>
          <button class="onb-option chip" type="button" data-onb-value="1-2 veces por semana">1-2 / sem</button>
          <button class="onb-option chip" type="button" data-onb-value="3-4 veces por semana">3-4 / sem</button>
          <button class="onb-option chip" type="button" data-onb-value="5 o mas veces">🔥 5+ / sem</button>
          <button class="onb-option chip" type="button" data-onb-value="Todos los dias">👑 Diario</button>
        </div>

        <p class="reg-feedback onb-feedback" id="onbp-feedback-2" aria-live="polite"></p>
        <a class="onb-cta" href="onboarding-3.html" data-onb-next>CONTINUAR →</a>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
