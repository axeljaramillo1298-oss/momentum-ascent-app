<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Paso 9 | Momentum Ascent</title>
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="onb-dark-body">
    <div class="noise"></div>
    <div class="stars"></div>
    <main class="onb-shell">
      <header class="onb-header">
        <a class="onb-back-btn" href="onboarding-8-modos.html" aria-label="Atras"><</a>
        <div class="onb-progress-wrap"><div class="onb-progress-bar" style="width:100%"></div></div>
        <span class="onb-step-label">9/9</span>
      </header>
      <div class="onb-hero">
        <img src="assets/extras/extra-01.jpeg" data-female-src="assets/extras/extra-11.jpeg" alt="Activa tu cuenta" loading="eager" />
        <div class="onb-hero-overlay"></div>
        <div class="onb-hero-label"><h1>ACTIVA<br />TU CUENTA</h1><p>El ultimo paso. El primero de muchos.</p></div>
      </div>
      <div class="onb-content">
        <p class="onb-eyebrow">Paso 9 - Registro</p>
        <h1 class="onb-title">Crea tu <span>perfil de atleta</span></h1>
        <p class="onb-sub">Tus datos activan el sistema. Todo queda protegido.</p>
        <div class="onb-form">
          <label class="onb-input-wrap">NOMBRE COMPLETO<input class="onb-input" id="onbp-nombre" type="text" placeholder="Tu nombre" data-onb-input="nombre" required /></label>
          <label class="onb-input-wrap">CORREO ELECTRONICO<input class="onb-input" id="onbp-email" type="email" placeholder="tu@email.com" data-onb-input="email" required /></label>
          <label class="onb-input-wrap">WHATSAPP<input class="onb-input" id="onbp-whatsapp" type="tel" maxlength="16" placeholder="+52 55..." data-onb-input="whatsapp" required /></label>
          <div class="onb-row-3">
            <label class="onb-input-wrap">EDAD<input class="onb-input" id="onbp-edad" type="number" min="14" max="90" placeholder="25" data-onb-input="edad" required /></label>
            <label class="onb-input-wrap">PESO (KG)<input class="onb-input" id="onbp-peso" type="number" min="35" max="350" step="0.1" placeholder="70" data-onb-input="peso" required /></label>
            <label class="onb-input-wrap">ESTATURA (CM)<input class="onb-input" id="onbp-estatura" type="number" min="120" max="230" step="0.1" placeholder="170" data-onb-input="estatura" required /></label>
          </div>
        </div>
        <p class="onb-section-label">Horario de check-in preferido</p>
        <div class="onb-options grid-chips" data-onb-key="horario" data-onb-type="single" data-onb-required="true">
          <button class="onb-option chip" type="button" data-onb-value="06:00 - 08:00">6am - 8am</button>
          <button class="onb-option chip" type="button" data-onb-value="12:00 - 14:00">12pm - 2pm</button>
          <button class="onb-option chip" type="button" data-onb-value="19:00 - 21:00">7pm - 9pm</button>
          <button class="onb-option chip" type="button" data-onb-value="21:00 - 23:00">9pm - 11pm</button>
        </div>
        <p class="onb-section-label">Plan</p>
        <div class="onb-options grid-2" data-onb-key="plan" data-onb-type="single" data-onb-required="true">
          <button class="onb-option" type="button" data-onb-value="Free"><span class="onb-option-icon">🆓</span><span class="onb-option-label">Free</span></button>
          <button class="onb-option" type="button" data-onb-value="Coach IA"><span class="onb-option-icon">🤖</span><span class="onb-option-label">Coach IA</span></button>
          <button class="onb-option" type="button" data-onb-value="Coach + Humano"><span class="onb-option-icon">👤</span><span class="onb-option-label">Coach + Humano</span></button>
          <button class="onb-option" type="button" data-onb-value="Elite"><span class="onb-option-icon">⭐</span><span class="onb-option-label">Elite</span></button>
        </div>
        <p class="onb-section-label">Extras (opcional)</p>
        <div class="onb-options grid-chips" data-onb-key="extras_plan" data-onb-type="multi" data-onb-required="true">
          <button class="onb-option chip" type="button" data-onb-value="Ninguno">Ninguno</button>
          <button class="onb-option chip" type="button" data-onb-value="Retos">Retos</button>
          <button class="onb-option chip" type="button" data-onb-value="Apuesta">Apuesta</button>
          <button class="onb-option chip" type="button" data-onb-value="Competencia">Competencia</button>
          <button class="onb-option chip" type="button" data-onb-value="Dieta Pro">Dieta Pro</button>
          <button class="onb-option chip" type="button" data-onb-value="Seguimiento personalizado">Seguimiento</button>
        </div>
        <p class="onb-section-label">Check-in con foto</p>
        <div class="onb-options grid-chips" data-onb-key="foto_checkin" data-onb-type="single" data-onb-required="true">
          <button class="onb-option chip" type="button" data-onb-value="Si">Si, con foto</button>
          <button class="onb-option chip" type="button" data-onb-value="No">Sin foto</button>
        </div>
        <label class="onb-check-wrap"><input type="checkbox" data-onb-check="compromiso" required /><span>Acepto responder en 10 minutos y penalizacion automatica si fallo.</span></label>
        <label class="onb-check-wrap"><input type="checkbox" data-onb-check="aviso" required /><span>Entiendo que esto no reemplaza asesoria medica profesional.</span></label>
        <p class="reg-feedback onb-feedback" id="onbp-feedback-9" aria-live="polite"></p>
        <button class="onb-cta" type="button" id="onbp-finish">ACTIVAR MI CUENTA</button>
        <a class="onb-login-link" href="registro.html#login">Ya tengo cuenta</a>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
