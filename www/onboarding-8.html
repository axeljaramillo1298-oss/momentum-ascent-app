<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Onboarding 8 | Disciplina</title>
    <meta name="theme-color" content="#e9f2ff" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="onb-body onb8v2-body">
    <main class="onb8v2-shell">
      <header class="onb8v2-top">
        <a class="onb-back onb8v2-back" href="onboarding-7.html" aria-label="Atras">&lt;</a>
        <div class="onb-dots onb8v2-dots">
          <span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot active"></span><span class="onb-dot"></span>
        </div>
        <span class="onb8v2-spacer" aria-hidden="true"></span>
      </header>

      <section class="onb8v2-stage">
        <article class="onb8v2-card">
          <img class="onb8v2-bg" src="assets/extras/onb6-status.png" alt="Personaliza tu coach" loading="lazy" />
          <div class="onb8v2-shade" aria-hidden="true"></div>

          <div class="onb8v2-content">
            <h1 class="onb8v2-title">PERSONALIZA TU<br /><span>COACH</span></h1>
            <p class="onb8v2-subtitle">Configura el estilo y rol de tu coach virtual.</p>

            <div class="onb8v2-panels">
              <article class="onb8v2-panel left">
                <p>REMINDER</p>
                <small>DON'T SKIP WORKOUTS</small>
                <small>OK</small>
              </article>
              <article class="onb8v2-panel right">
                <p>TODO<br />ES<br />MENTAL</p>
              </article>
            </div>

            <h3 class="onb8v2-label">Perfil de usuario</h3>
            <div class="onbp-options onb8v2-grid2" data-onb-key="perfil" data-onb-type="single" data-onb-required="true">
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Guerrero">🗿 Guerrero</button>
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Constante">⌛ Constante</button>
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Explosivo">⚡ Explosivo</button>
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Estrategico">🧠 Estrategico</button>
            </div>

            <h3 class="onb8v2-label">Modulo principal</h3>
            <div class="onbp-options onb8v2-grid3" data-onb-key="modulo" data-onb-type="single" data-onb-required="true">
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Fitness">🏋️ Fitness</button>
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Estudio diario">📊 Estudio</button>
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Programacion diaria">💻 Programacion</button>
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Idiomas">📚 Idiomas</button>
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Finanzas personales">💳 Finanzas</button>
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Meditacion">🧘 Meditacion</button>
            </div>

            <h3 class="onb8v2-label">Voz para mensajes</h3>
            <div class="onbp-options onb8v2-grid3" data-onb-key="voz" data-onb-type="single" data-onb-required="true">
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Masculina seria">🎙️ Masculina seria</button>
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Femenina estricta">🎙️ Femenina estricta</button>
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Robotica neutral">🤖 Robotica neutral</button>
            </div>

            <h3 class="onb8v2-label">Modo especial</h3>
            <div class="onbp-options onb8v2-grid3" data-onb-key="modo_especial" data-onb-type="single" data-onb-required="true">
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Contrato">📜 Contrato</button>
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Apuesta">💸 Apuesta</button>
              <button class="onbp-option onb8v2-pill" type="button" data-onb-value="Competencia">🏆 Competencia</button>
            </div>
            <label class="onbp-input-wrap hidden-field" id="onbp-apuesta-wrap">
              Monto de apuesta (si aplica)
              <input class="onbp-input" id="onbp-apuesta" type="number" min="0" step="1" placeholder="Ej. 20" data-onb-input="apuesta" />
            </label>

            <p class="reg-feedback onb8v2-feedback" id="onbp-feedback-8" aria-live="polite"></p>

            <a class="onb-go onb8v2-btn" data-onb-next href="onboarding-9.html">
              <strong>FINALIZAR</strong>
              <span>Personalizar rutina</span>
            </a>
          </div>
        </article>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
