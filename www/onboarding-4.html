<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Onboarding 4 | Disciplina</title>
    <meta name="theme-color" content="#dff8de" />
    <link rel="preload" as="image" href="assets/extras/onb4-results.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="onb-body onb4v2-body">
    <main class="onb4v2-shell">
      <header class="onb4v2-top">
        <a class="onb-back onb4v2-back" href="onboarding-3.html" aria-label="Atras">&lt;</a>
        <div class="onb-dots onb4v2-dots">
          <span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot active"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span>
        </div>
        <span class="onb4v2-spacer" aria-hidden="true"></span>
      </header>

      <section class="onb4v2-stage">
        <article class="onb4v2-card">
          <img class="onb4v2-bg" src="assets/extras/onb4-results.png" alt="Ve resultados reales" loading="eager" decoding="async" fetchpriority="high" />
          <div class="onb4v2-shade" aria-hidden="true"></div>

          <div class="onb4v2-content">
            <h1 class="onb4v2-title">
              VE RESULTADOS<br />
              <span>REALES</span>
            </h1>

            <p class="onb4v2-copy">
              Mide tu progreso basado en respuestas, rachas y
              porcentaje de cumplimiento
            </p>

            <a class="onb4v2-btn" href="onboarding-4-apuesta.html">
              <strong>SIGUIENTE</strong>
              <span>Confirma tu progreso</span>
            </a>

            <div class="onb4v2-mini-dots" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span><span class="active"></span><span></span><span></span>
            </div>
          </div>
        </article>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
