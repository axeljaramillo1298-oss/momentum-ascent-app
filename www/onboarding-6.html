<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Onboarding 6 | Disciplina</title>
    <meta name="theme-color" content="#f1f1f6" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="onb-body">
    <main class="onbp-shell">
      <header class="onbp-top">
        <a class="onb-back" href="onboarding-5.html" aria-label="Atras">&lt;</a>
        <div class="onb-dots"><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot active"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span></div>
      </header>
      <section class="onbp-screen">
        <article class="onbp-card">
          <h2 class="onbp-q-title">Estado actual</h2>
          <div class="onbp-photo-grid">
            <img class="onbp-photo" src="assets/extras/extra-09.jpeg" alt="Entrenamiento funcional" loading="lazy" />
            <img class="onbp-photo" src="assets/extras/extra-11.jpeg" alt="Rutina personal" loading="lazy" />
          </div>
          <h3 class="onbp-subtitle">Nivel actual</h3>
          <div class="onbp-options" data-onb-key="nivel" data-onb-type="single" data-onb-required="true">
            <button class="onbp-option" type="button" data-onb-value="Bajo">Bajo</button>
            <button class="onbp-option" type="button" data-onb-value="Medio">Medio</button>
            <button class="onbp-option" type="button" data-onb-value="Alto">Alto</button>
          </div>
          <h3 class="onbp-subtitle">Lesiones o restricciones</h3>
          <div class="onbp-options" data-onb-key="lesiones" data-onb-type="single" data-onb-required="true">
            <button class="onbp-option" type="button" data-onb-value="No">No</button>
            <button class="onbp-option" type="button" data-onb-value="Si">Si</button>
          </div>
          <h3 class="onbp-subtitle">Trigger dominante</h3>
          <div class="onbp-options" data-onb-key="trigger" data-onb-type="single" data-onb-required="true">
            <button class="onbp-option" type="button" data-onb-value="Ansiedad">Ansiedad</button>
            <button class="onbp-option" type="button" data-onb-value="Estres">Estres</button>
            <button class="onbp-option" type="button" data-onb-value="Falta de tiempo">Falta de tiempo</button>
          </div>
          <h3 class="onbp-subtitle">Estilo de alimentacion</h3>
          <div class="onbp-options" data-onb-key="alimentacion" data-onb-type="single" data-onb-required="true">
            <button class="onbp-option" type="button" data-onb-value="Simple">Simple</button>
            <button class="onbp-option" type="button" data-onb-value="Flexible">Flexible</button>
            <button class="onbp-option" type="button" data-onb-value="Guiado">Guiado</button>
          </div>
          <p class="reg-feedback" id="onbp-feedback-6" aria-live="polite"></p>
        </article>
        <div class="onb-actions"><a class="primary onb-go" data-onb-next href="onboarding-7.html">Siguiente</a></div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
