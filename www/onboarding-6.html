<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Paso 6 | Momentum Ascent</title>
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="onb-dark-body">
    <div class="noise"></div>
    <div class="stars"></div>
    <main class="onb-shell">
      <header class="onb-header">
        <a class="onb-back-btn" href="onboarding-5.html" aria-label="Atras"><</a>
        <div class="onb-progress-wrap"><div class="onb-progress-bar" style="width:66%"></div></div>
        <span class="onb-step-label">6/9</span>
      </header>
      <div class="onb-hero">
        <img src="assets/extras/extra-07.jpeg" data-female-src="assets/extras/extra-17.jpeg" alt="Tu estado actual" loading="eager" />
        <div class="onb-hero-overlay"></div>
        <div class="onb-hero-label"><h1>ESTADO<br />ACTUAL</h1><p>El punto de partida real.</p></div>
      </div>
      <div class="onb-content">
        <p class="onb-eyebrow">Paso 6 - Diagnostico fisico</p>
        <h1 class="onb-title">Como estas <span>hoy fisicamente?</span></h1>
        <p class="onb-sub">Tu plan se ajusta segun tu condicion actual.</p>
        <p class="onb-section-label">Nivel de condicion fisica</p>
        <div class="onb-options grid-2" data-onb-key="nivel" data-onb-type="single" data-onb-required="true">
          <button class="onb-option" type="button" data-onb-value="Bajo"><span class="onb-option-icon">BJ</span><span class="onb-option-label">Bajo - Inicio o regreso</span></button>
          <button class="onb-option" type="button" data-onb-value="Medio"><span class="onb-option-icon">MD</span><span class="onb-option-label">Medio - Algo de condicion</span></button>
          <button class="onb-option" type="button" data-onb-value="Alto"><span class="onb-option-icon">AL</span><span class="onb-option-label">Alto - Entreno regular</span></button>
          <button class="onb-option" type="button" data-onb-value="Elite"><span class="onb-option-icon">EL</span><span class="onb-option-label">Elite - Competitivo</span></button>
        </div>
        <p class="onb-section-label">Tienes alguna lesion activa?</p>
        <div class="onb-options grid-chips" data-onb-key="lesiones" data-onb-type="single" data-onb-required="true">
          <button class="onb-option chip" type="button" data-onb-value="No">Sin lesiones</button>
          <button class="onb-option chip" type="button" data-onb-value="Leve">Lesion leve</button>
          <button class="onb-option chip" type="button" data-onb-value="Si">Tengo lesiones</button>
        </div>
        <p class="onb-section-label">Estilo de alimentacion preferido</p>
        <div class="onb-options grid-2" data-onb-key="alimentacion" data-onb-type="single" data-onb-required="true">
          <button class="onb-option" type="button" data-onb-value="Simple"><span class="onb-option-icon">SM</span><span class="onb-option-label">Simple - Comidas faciles</span></button>
          <button class="onb-option" type="button" data-onb-value="Flexible"><span class="onb-option-icon">FX</span><span class="onb-option-label">Flexible - Sin reglas estrictas</span></button>
          <button class="onb-option" type="button" data-onb-value="Guiado"><span class="onb-option-icon">GD</span><span class="onb-option-label">Guiado - Plan estructurado</span></button>
          <button class="onb-option" type="button" data-onb-value="Dieta especifica"><span class="onb-option-icon">DE</span><span class="onb-option-label">Dieta especifica</span></button>
        </div>
        <p class="reg-feedback onb-feedback" id="onbp-feedback-6" aria-live="polite"></p>
        <a class="onb-cta" href="onboarding-7.html" data-onb-next>CREAR MI PLAN</a>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
