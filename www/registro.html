<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Acceso | Momentum Ascent</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <div class="stars"></div>

    <main class="login-shell">
      <a class="login-logo" href="index.html" aria-label="Inicio">
        <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="lg-login" x1="0" y1="36" x2="36" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#ff3b30"/>
              <stop offset="100%" stop-color="#f5c04a"/>
            </linearGradient>
          </defs>
          <circle cx="18" cy="18" r="17" stroke="url(#lg-login)" stroke-width="2" fill="none" opacity="0.35"/>
          <path d="M18 7 C14 12 10 14 11 20 C12 25 15 27 18 28 C21 27 24 25 25 20 C26 14 22 12 18 7Z" fill="url(#lg-login)" opacity="0.9"/>
          <path d="M18 13 C16 16 15 18 16 21 C17 23.5 18 24 18 24 C18 24 19 23.5 20 21 C21 18 20 16 18 13Z" fill="rgba(255,255,255,0.55)"/>
        </svg>
        <span>MOMENTUM ASCENT</span>
      </a>

      <section class="login-card" id="login">
        <div class="login-card-header">
          <h1 class="login-title">Continua tu racha</h1>
          <p class="login-sub">Ingresa para volver a tu panel de disciplina</p>
        </div>

        <form class="login-form" id="login-form" novalidate>
          <div class="login-field">
            <label class="login-label" for="login-email">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Email
            </label>
            <input class="login-input" id="login-email" type="email" placeholder="tu@email.com" autocomplete="email" />
          </div>

          <div class="login-field">
            <label class="login-label" for="login-whatsapp">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              WhatsApp
            </label>
            <input class="login-input" id="login-whatsapp" type="tel" maxlength="16" placeholder="+52 10 digitos" autocomplete="tel" />
          </div>

          <div class="login-field hidden-field" id="login-password-field">
            <label class="login-label" for="login-password">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              Contrasena admin
            </label>
            <input class="login-input" id="login-password" type="password" placeholder="********" autocomplete="current-password" />
          </div>

          <button class="login-submit" type="submit">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M20 12H8M20 12L16 8M20 12L16 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Entrar al panel
          </button>

          <p class="reg-feedback login-feedback" id="login-feedback" aria-live="polite"></p>
        </form>

        <div class="login-divider"><span>Primera vez</span></div>

        <a class="login-register-btn" href="onboarding-1.html">
          Crear cuenta y empezar onboarding
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>

        <a class="login-back" href="index.html">Volver al inicio</a>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
