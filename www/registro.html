<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Acceso | Momentum Ascent</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <div class="stars"></div>
    <main class="login-shell">
      <a class="login-logo" href="index.html" aria-label="Inicio">
        <span>MOMENTUM ASCENT</span>
      </a>
      <section class="login-card" id="login">
        <div class="login-card-header">
          <h1 class="login-title">Accede o crea tu cuenta</h1>
          <p class="login-sub">Entra al dashboard o activa una nueva cuenta para ver picks deportivos con IA.</p>
        </div>
        <form class="login-form" id="login-form" novalidate>
          <div class="login-field">
            <label class="login-label" for="login-email">Email</label>
            <input class="login-input" id="login-email" type="email" placeholder="tu@email.com" autocomplete="email" />
          </div>
          <div class="login-field">
            <label class="login-label" for="login-whatsapp">WhatsApp</label>
            <input class="login-input" id="login-whatsapp" type="tel" maxlength="16" placeholder="+52 10 digitos" autocomplete="tel" />
          </div>
          <div class="login-field hidden-field" id="login-password-field">
            <label class="login-label" for="login-password">Contrasena admin</label>
            <input class="login-input" id="login-password" type="password" placeholder="********" autocomplete="current-password" />
          </div>
          <button class="login-submit" type="submit">Entrar al dashboard</button>
          <p class="reg-feedback login-feedback" id="login-feedback" aria-live="polite"></p>
        </form>
        <div class="login-divider"><span>Nueva cuenta</span></div>
        <form class="login-form" id="register-form" novalidate>
          <div class="login-field">
            <label class="login-label" for="register-name">Nombre</label>
            <input class="login-input" id="register-name" type="text" placeholder="Tu nombre" autocomplete="name" />
          </div>
          <div class="login-field">
            <label class="login-label" for="register-email">Email</label>
            <input class="login-input" id="register-email" type="email" placeholder="tu@email.com" autocomplete="email" />
          </div>
          <div class="login-field">
            <label class="login-label" for="register-whatsapp">WhatsApp</label>
            <input class="login-input" id="register-whatsapp" type="tel" maxlength="16" placeholder="+52 10 digitos" autocomplete="tel" />
          </div>
          <div class="login-field">
            <label class="login-label" for="register-ref">Código de referido (opcional)</label>
            <input class="login-input" id="register-ref" name="ref" type="text" placeholder="Código de referido (opcional)" maxlength="10" autocapitalize="characters" autocomplete="off" />
          </div>
          <button class="login-register-btn" type="submit">Crear cuenta y entrar</button>
          <p class="reg-feedback login-feedback" id="register-feedback" aria-live="polite"></p>
        </form>
        <a class="login-back" href="index.html">Volver al inicio</a>
      </section>
    </main>
    <script src="app.js"></script>
    <script>
      (function(){
        try {
          var refFromUrl = new URLSearchParams(location.search).get('ref');
          if (refFromUrl) {
            var input = document.getElementById('register-ref');
            if (input) input.value = refFromUrl.toUpperCase().slice(0, 10);
          }
        } catch(_) {}
      })();
    </script>
  </body>
</html>
