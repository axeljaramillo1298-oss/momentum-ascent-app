<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Paso 7 | Momentum Ascent</title>
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="onb-dark-body">
    <div class="noise"></div>
    <div class="stars"></div>
    <main class="onb-shell">
      <header class="onb-header">
        <a class="onb-back-btn" href="onboarding-6.html" aria-label="Atras">←</a>
        <div class="onb-progress-wrap"><div class="onb-progress-bar" style="width:77%"></div></div>
        <span class="onb-step-label">7/9</span>
      </header>

      <div class="onb-hero">
        <img src="assets/extras/extra-08.jpeg" data-female-src="assets/extras/extra-18.jpeg" alt="Deporte y equipo" loading="eager" />
        <div class="onb-hero-overlay"></div>
        <div class="onb-hero-label">
          <h1>DEPORTE<br />Y EQUIPO</h1>
          <p>Tu actividad. Tu arsenal.</p>
        </div>
      </div>

      <div class="onb-content">
        <p class="onb-eyebrow">Paso 7 — Entrenamiento</p>
        <h1 class="onb-title">¿Cuál es tu <span>deporte principal?</span></h1>
        <p class="onb-sub">Elige tu actividad y el equipo disponible.</p>

        <p class="onb-section-label">Deporte principal</p>
        <div class="onb-options grid-chips" id="onb7-sports" data-onb-key="deporte" data-onb-type="single" data-onb-required="true">
          <button class="onb-option chip" type="button" data-onb-value="Gym">🏋️ Gym</button>
          <button class="onb-option chip" type="button" data-onb-value="Running">🏃 Running</button>
          <button class="onb-option chip" type="button" data-onb-value="Ciclismo">🚴 Ciclismo</button>
          <button class="onb-option chip" type="button" data-onb-value="Natacion">🏊 Natación</button>
          <button class="onb-option chip" type="button" data-onb-value="Calistenia">🤸 Calistenia</button>
          <button class="onb-option chip" type="button" data-onb-value="CrossFit">🏋️ CrossFit</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Futbol">⚽ Fútbol</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Futbol Americano">🏈 Americano</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Basquetbol">🏀 Basket</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Tenis">🎾 Tenis</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Padel">🥎 Padel</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Box">🥊 Box</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="MMA">🛡️ MMA</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Muay Thai">🦵 Muay Thai</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="BJJ">🥋 BJJ</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Hyrox">🏁 Hyrox</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Powerlifting">🏋️ Powerlifting</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Halterofilia">🏋️ Halterofilia</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Entrenamiento funcional">🏃 Funcional</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Yoga">🧘 Yoga</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Pilates">🧘 Pilates</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Escalada">🧗 Escalada</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Senderismo">🥾 Senderismo</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Trail running">🏔️ Trail</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Triatlon">🏊 Triatlón</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Spinning">🚲 Spinning</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Baile">💃 Baile</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Surf">🏄 Surf</button>
          <button class="onb-option chip onb7-extra hidden-field" type="button" data-onb-value="Otro">➕ Otro</button>
        </div>
        <button class="onb-show-more" id="onb7-more" type="button">VER MÁS DEPORTES ↓</button>

        <label class="onb-input-wrap hidden-field" id="onb7-otro-wrap">
          Especifica tu deporte
          <input class="onb-input" id="onb7-otro" type="text" placeholder="Ej. Natación" data-onb-input="deporte_otro" />
        </label>

        <p class="onb-section-label">Entrenamiento en casa</p>
        <div class="onb-options grid-chips" data-onb-key="entreno_casa" data-onb-type="single" data-onb-required="true">
          <button class="onb-option chip" type="button" data-onb-value="No">🚫 No</button>
          <button class="onb-option chip" type="button" data-onb-value="Si">✅ Sí</button>
          <button class="onb-option chip" type="button" data-onb-value="Mixto">⚡ Mixto</button>
        </div>

        <p class="onb-section-label">Equipo disponible en casa</p>
        <div class="onb-options grid-chips" data-onb-key="equipo_casa" data-onb-type="multi" data-onb-required="true">
          <button class="onb-option chip" type="button" data-onb-value="Ninguno">🚫 Ninguno</button>
          <button class="onb-option chip" type="button" data-onb-value="Set completo">🏋️ Set completo</button>
          <button class="onb-option chip" type="button" data-onb-value="Mancuernas">💪 Mancuernas</button>
          <button class="onb-option chip" type="button" data-onb-value="Barra y discos">🥏 Barra + discos</button>
          <button class="onb-option chip" type="button" data-onb-value="Banco">🪑 Banco</button>
          <button class="onb-option chip" type="button" data-onb-value="Ligas y bandas">🪢 Ligas / bandas</button>
          <button class="onb-option chip" type="button" data-onb-value="Cardio">🚴 Cardio</button>
        </div>

        <p class="reg-feedback onb-feedback" id="onbp-feedback-7" aria-live="polite"></p>
        <a class="onb-cta" href="onboarding-8.html" data-onb-next>CONTINUAR →</a>
      </div>
    </main>
    <script src="app.js"></script>
    <script>
      (function () {
        var btn = document.getElementById("onb7-more");
        var extras = document.querySelectorAll(".onb7-extra");
        if (!btn) return;
        btn.addEventListener("click", function () {
          var expanded = btn.classList.toggle("expanded");
          extras.forEach(function (el) { el.classList.toggle("hidden-field", !expanded); });
          btn.textContent = expanded ? "VER MENOS ↑" : "VER MÁS DEPORTES ↓";
        });
      })();
    </script>
  </body>
</html>
