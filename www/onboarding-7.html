<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Onboarding 7 | Disciplina</title>
    <meta name="theme-color" content="#f1f1f6" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="onb-body">
    <main class="onbp-shell">
      <header class="onbp-top">
        <a class="onb-back" href="onboarding-6.html" aria-label="Atras">&lt;</a>
        <div class="onb-dots"><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot active"></span><span class="onb-dot"></span><span class="onb-dot"></span></div>
      </header>
      <section class="onbp-screen">
        <article class="onbp-card">
          <h2 class="onbp-q-title">Deporte y equipo</h2>
          <div class="onbp-photo-grid">
            <img class="onbp-photo" src="assets/extras/extra-16.jpeg" alt="Deporte principal" loading="lazy" />
            <img class="onbp-photo" src="assets/extras/extra-20.jpeg" alt="Entrenamiento en casa" loading="lazy" />
          </div>
          <h3 class="onbp-subtitle">Deporte principal</h3>
          <div class="onbp-options" data-onb-key="deporte" data-onb-type="single" data-onb-required="true">
            <button class="onbp-option" type="button" data-onb-value="Ninguno">Ninguno</button>
            <button class="onbp-option" type="button" data-onb-value="Running">Running</button>
            <button class="onbp-option" type="button" data-onb-value="Gym">Gym</button>
            <button class="onbp-option" type="button" data-onb-value="Ciclismo">Ciclismo</button>
            <button class="onbp-option" type="button" data-onb-value="Natacion">Natacion</button>
            <button class="onbp-option" type="button" data-onb-value="Futbol">Futbol</button>
            <button class="onbp-option" type="button" data-onb-value="Futbol Americano">Futbol Americano</button>
            <button class="onbp-option" type="button" data-onb-value="Basquetbol">Basquetbol</button>
            <button class="onbp-option" type="button" data-onb-value="Tenis">Tenis</button>
            <button class="onbp-option" type="button" data-onb-value="Padel">Padel</button>
            <button class="onbp-option" type="button" data-onb-value="Volleyball">Volleyball</button>
            <button class="onbp-option" type="button" data-onb-value="Beisbol">Beisbol</button>
            <button class="onbp-option" type="button" data-onb-value="Softbol">Softbol</button>
            <button class="onbp-option" type="button" data-onb-value="Box">Box</button>
            <button class="onbp-option" type="button" data-onb-value="MMA">MMA</button>
            <button class="onbp-option" type="button" data-onb-value="Muay Thai">Muay Thai</button>
            <button class="onbp-option" type="button" data-onb-value="BJJ">BJJ</button>
            <button class="onbp-option" type="button" data-onb-value="CrossFit">CrossFit</button>
            <button class="onbp-option" type="button" data-onb-value="Hyrox">Hyrox</button>
            <button class="onbp-option" type="button" data-onb-value="Calistenia">Calistenia</button>
            <button class="onbp-option" type="button" data-onb-value="Halterofilia">Halterofilia</button>
            <button class="onbp-option" type="button" data-onb-value="Powerlifting">Powerlifting</button>
            <button class="onbp-option" type="button" data-onb-value="Entrenamiento funcional">Funcional</button>
            <button class="onbp-option" type="button" data-onb-value="Spinning">Spinning</button>
            <button class="onbp-option" type="button" data-onb-value="Remo">Remo</button>
            <button class="onbp-option" type="button" data-onb-value="Escalada">Escalada</button>
            <button class="onbp-option" type="button" data-onb-value="Senderismo">Senderismo</button>
            <button class="onbp-option" type="button" data-onb-value="Trail running">Trail running</button>
            <button class="onbp-option" type="button" data-onb-value="Triatlon">Triatlon</button>
            <button class="onbp-option" type="button" data-onb-value="Yoga">Yoga</button>
            <button class="onbp-option" type="button" data-onb-value="Pilates">Pilates</button>
            <button class="onbp-option" type="button" data-onb-value="Baile">Baile</button>
            <button class="onbp-option" type="button" data-onb-value="Patinaje">Patinaje</button>
            <button class="onbp-option" type="button" data-onb-value="Surf">Surf</button>
            <button class="onbp-option" type="button" data-onb-value="Otro">Otro</button>
          </div>
          <label class="onbp-input-wrap hidden-field" id="onbp-deporte-otro-wrap">Especifica deporte
            <input class="onbp-input" id="onbp-deporte-otro" type="text" placeholder="Ej. Natacion" data-onb-input="deporte_otro" />
          </label>

          <h3 class="onbp-subtitle">Entrenamiento en casa</h3>
          <div class="onbp-options" data-onb-key="entreno_casa" data-onb-type="single" data-onb-required="true">
            <button class="onbp-option" type="button" data-onb-value="Si">Si</button>
            <button class="onbp-option" type="button" data-onb-value="No">No</button>
            <button class="onbp-option" type="button" data-onb-value="Mixto">Mixto</button>
          </div>

          <h3 class="onbp-subtitle">Equipo disponible</h3>
          <p class="onbp-helper">Puedes marcar mas de una opcion. Si eliges "Ninguno", se limpia el resto.</p>
          <div class="onbp-options" data-onb-key="equipo_casa" data-onb-type="multi" data-onb-required="true">
            <button class="onbp-option" type="button" data-onb-value="Ninguno">Ninguno</button>
            <button class="onbp-option" type="button" data-onb-value="Ligas / bandas">Ligas</button>
            <button class="onbp-option" type="button" data-onb-value="Mancuernas">Mancuernas</button>
            <button class="onbp-option" type="button" data-onb-value="Caminadora">Caminadora</button>
            <button class="onbp-option" type="button" data-onb-value="Set completo">Set completo</button>
          </div>
          <p class="reg-feedback" id="onbp-feedback-7" aria-live="polite"></p>
        </article>
        <div class="onb-actions"><a class="primary onb-go" data-onb-next href="onboarding-8.html">Siguiente</a></div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
