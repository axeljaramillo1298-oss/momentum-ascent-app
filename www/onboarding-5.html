<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Paso 5 | Momentum Ascent</title>
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="onb-dark-body">
    <div class="noise"></div>
    <div class="stars"></div>
    <main class="onb-shell">
      <header class="onb-header">
        <a class="onb-back-btn" href="onboarding-4-apuesta.html" aria-label="Atras">←</a>
        <div class="onb-progress-wrap"><div class="onb-progress-bar" style="width:55%"></div></div>
        <span class="onb-step-label">5/9</span>
      </header>

      <div class="onb-hero">
        <img src="assets/extras/extra-06.jpeg" alt="Define tu meta" loading="eager" />
        <div class="onb-hero-overlay"></div>
        <div class="onb-hero-label">
          <h1>DEFINE<br />TU META</h1>
          <p>Sin meta clara, no hay dirección.</p>
        </div>
      </div>

      <div class="onb-content">
        <p class="onb-eyebrow">Paso 5 — Tu objetivo</p>
        <h1 class="onb-title">¿Qué quieres <span>lograr primero?</span></h1>
        <p class="onb-sub">Elige el objetivo principal. El sistema se enfoca ahí.</p>

        <p class="onb-section-label">Objetivo principal</p>
        <div class="onb-options grid-2" data-onb-key="objetivo" data-onb-type="single" data-onb-required="true">
          <button class="onb-option" type="button" data-onb-value="Bajar peso">
            <span class="onb-option-icon">🔥</span>
            <span class="onb-option-label">Bajar peso</span>
          </button>
          <button class="onb-option" type="button" data-onb-value="Ganar musculo">
            <span class="onb-option-icon">💪</span>
            <span class="onb-option-label">Ganar músculo</span>
          </button>
          <button class="onb-option" type="button" data-onb-value="Resistencia">
            <span class="onb-option-icon">⚡</span>
            <span class="onb-option-label">Resistencia</span>
          </button>
          <button class="onb-option" type="button" data-onb-value="Mentalidad">
            <span class="onb-option-icon">🧠</span>
            <span class="onb-option-label">Mentalidad</span>
          </button>
          <button class="onb-option" type="button" data-onb-value="Constancia">
            <span class="onb-option-icon">📅</span>
            <span class="onb-option-label">Constancia diaria</span>
          </button>
          <button class="onb-option" type="button" data-onb-value="Rendimiento total">
            <span class="onb-option-icon">🎯</span>
            <span class="onb-option-label">Rendimiento total</span>
          </button>
        </div>

        <p class="onb-section-label">¿Dónde entrenas?</p>
        <div class="onb-options grid-chips" data-onb-key="lugar" data-onb-type="single" data-onb-required="true">
          <button class="onb-option chip" type="button" data-onb-value="Casa">🏠 Casa</button>
          <button class="onb-option chip" type="button" data-onb-value="Gym">🏋️ Gym</button>
          <button class="onb-option chip" type="button" data-onb-value="Mixto">⚡ Mixto</button>
          <button class="onb-option chip" type="button" data-onb-value="Al aire libre">🌿 Aire libre</button>
        </div>

        <p class="onb-section-label">Tono del coach</p>
        <div class="onb-options grid-chips" data-onb-key="tono" data-onb-type="single" data-onb-required="true">
          <button class="onb-option chip" type="button" data-onb-value="Neutral">🙂 Neutral</button>
          <button class="onb-option chip" type="button" data-onb-value="Estricto">🪖 Estricto</button>
          <button class="onb-option chip" type="button" data-onb-value="Rudo">🔥 Rudo</button>
        </div>

        <p class="reg-feedback onb-feedback" id="onbp-feedback-5" aria-live="polite"></p>
        <a class="onb-cta" href="onboarding-6.html" data-onb-next>CONTINUAR →</a>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
