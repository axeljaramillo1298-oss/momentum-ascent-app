<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Onboarding 5 | Disciplina</title>
    <meta name="theme-color" content="#f1f1f6" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="onb-body">
    <main class="onbp-shell">
      <header class="onbp-top">
        <a class="onb-back" href="onboarding-4.html" aria-label="Atras">&lt;</a>
        <div class="onb-dots"><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot active"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span></div>
      </header>
      <section class="onbp-screen">
        <article class="onbp-card">
          <h2 class="onbp-q-title">Meta inicial</h2>
          <div class="onbp-photo-wrap">
            <img class="onbp-photo" src="assets/extras/extra-03.jpeg" alt="Fitness motivacional" loading="lazy" />
          </div>
          <h3 class="onbp-subtitle">Objetivo principal</h3>
          <div class="onbp-options" data-onb-key="objetivo" data-onb-type="single" data-onb-required="true">
            <button class="onbp-option" type="button" data-onb-value="Bajar peso">Bajar peso</button>
            <button class="onbp-option" type="button" data-onb-value="Ganar musculo">Ganar musculo</button>
            <button class="onbp-option" type="button" data-onb-value="Resistencia">Resistencia</button>
            <button class="onbp-option" type="button" data-onb-value="Mentalidad">Mentalidad</button>
            <button class="onbp-option" type="button" data-onb-value="Constancia">Constancia diaria</button>
            <button class="onbp-option" type="button" data-onb-value="Ambos">Ambos</button>
          </div>
          <h3 class="onbp-subtitle">Tiempo diario disponible</h3>
          <div class="onbp-options" data-onb-key="tiempo" data-onb-type="single" data-onb-required="true">
            <button class="onbp-option" type="button" data-onb-value="20 min">20 min</button>
            <button class="onbp-option" type="button" data-onb-value="30 min">30 min</button>
            <button class="onbp-option" type="button" data-onb-value="40 min">40 min</button>
          </div>
          <h3 class="onbp-subtitle">Lugar de entrenamiento</h3>
          <div class="onbp-options" data-onb-key="lugar" data-onb-type="single" data-onb-required="true">
            <button class="onbp-option" type="button" data-onb-value="Casa">Casa</button>
            <button class="onbp-option" type="button" data-onb-value="Gym">Gym</button>
            <button class="onbp-option" type="button" data-onb-value="Mixto">Mixto</button>
          </div>
          <h3 class="onbp-subtitle">Tono del coach</h3>
          <div class="onbp-options" data-onb-key="tono" data-onb-type="single" data-onb-required="true">
            <button class="onbp-option" type="button" data-onb-value="Estricto">Estricto</button>
            <button class="onbp-option" type="button" data-onb-value="Neutral">Neutral</button>
            <button class="onbp-option" type="button" data-onb-value="Rudo">Rudo</button>
          </div>
          <p class="reg-feedback" id="onbp-feedback-5" aria-live="polite"></p>
        </article>
        <div class="onb-actions"><a class="primary onb-go" data-onb-next href="onboarding-6.html">Siguiente</a></div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
