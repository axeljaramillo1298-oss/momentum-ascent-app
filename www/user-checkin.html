<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Perfil | Momentum Ascent</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="user-panel-premium">
    <main class="user-panel-shell">
      <header class="user-panel-top">
        <nav class="user-panel-nav">
          <div class="logo">MOMENTUM ASCENT</div>
          <div class="nav-actions">
            <a class="ghost up-nav-link" href="user-hoy.html" data-nav="hoy">Hoy</a>
            <a class="ghost up-nav-link" href="user-rutinas.html" data-nav="rutinas">Rutinas</a>
            <a class="ghost up-nav-link" href="user-progreso.html" data-nav="progreso">Progreso</a>
            <a class="ghost up-nav-link" href="user-dieta.html" data-nav="nutricion">Nutricion</a>
            <a class="ghost up-nav-link up-nav-active" href="user-checkin.html" data-nav="perfil">Perfil</a>
            <button class="ghost" type="button" data-action="theme">Cambiar vista</button>
          </div>
        </nav>
        <div class="user-panel-hero">
          <p class="eyebrow">MOMENTUM INDEX</p>
          <h1>MI PERFIL</h1>
          <p class="subhead">Tu progreso, nivel, apuesta activa y evidencia de entrenamiento.</p>
        </div>
      </header>

      <section class="section" style="padding-bottom:0;">
        <div class="profile-header-card" id="profile-header-card">
          <div class="profile-avatar">?</div>
          <div class="profile-name">Cargando...</div>
        </div>
      </section>

      <section class="section admin-grid">
        <article class="card">
          <div class="section-header-row">
            <h3>Modo Apuesta</h3>
          </div>
          <div class="bet-status-card"></div>
        </article>

        <article class="card">
          <h3>Nuevo check-in con foto</h3>
          <form id="user-checkin-form" class="admin-form">
            <label>Foto<input id="user-checkin-file" type="file" accept="image/*" capture="environment" required /></label>
            <label>Nota<input id="user-checkin-note" type="text" placeholder="Ej. Full body 30 min" required /></label>
            <img id="user-checkin-preview" class="photo-preview" alt="preview" />
            <button class="primary" type="submit">Guardar check-in</button>
            <p class="reg-feedback" id="user-checkin-feedback" aria-live="polite"></p>
          </form>
        </article>

        <article class="card">
          <h3>Historial reciente</h3>
          <div id="user-checkin-list" class="admin-list"></div>
        </article>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Navegacion principal">
      <a class="bottom-nav-item" href="user-hoy.html">
        <span class="bottom-nav-icon">HO</span><span>Hoy</span>
      </a>
      <a class="bottom-nav-item" href="user-rutinas.html">
        <span class="bottom-nav-icon">RT</span><span>Rutinas</span>
      </a>
      <a class="bottom-nav-item" href="user-progreso.html">
        <span class="bottom-nav-icon">PR</span><span>Progreso</span>
      </a>
      <a class="bottom-nav-item" href="user-dieta.html">
        <span class="bottom-nav-icon">NU</span><span>Nutricion</span>
      </a>
      <a class="bottom-nav-item bottom-nav-active" href="user-checkin.html">
        <span class="bottom-nav-icon">PF</span><span>Perfil</span>
      </a>
    </nav>

    <script src="app.js"></script>
  </body>
</html>
