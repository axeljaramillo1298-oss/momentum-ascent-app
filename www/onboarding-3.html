<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Onboarding 3 | Disciplina</title>
    <meta name="theme-color" content="#edf2ff" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="onb-body onb3v2-body">
    <main class="onb3v2-shell">
      <header class="onb3v2-top">
        <a class="onb-back onb3v2-back" href="onboarding-2.html" aria-label="Atras">&lt;</a>
        <div class="onb-dots onb3v2-dots">
          <span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot active"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span><span class="onb-dot"></span>
        </div>
        <span class="onb3v2-spacer" aria-hidden="true"></span>
      </header>

      <section class="onb3v2-stage">
        <article class="onb3v2-card">
          <img class="onb3v2-bg" src="assets/extras/onb3-hydration.png" alt="Activa tu hidratacion" loading="lazy" />
          <div class="onb3v2-shade" aria-hidden="true"></div>

          <div class="onb3v2-content">
            <p class="onb3v2-mantra">
              DRINK <span>WATER</span><br />
              REPEAT<br />
              DRINK <span>WATER</span>
            </p>

            <div class="onb3v2-lower">
              <div class="onb3v2-head">
                <h1 class="onb3v2-title">
                  <span class="onb3v2-line onb3v2-line-top">
                    <span class="onb3v2-activa">ACTIVA</span>
                    <span class="onb3v2-meta-inline" aria-label="Meta diaria">
                      <span class="onb3v2-drops" aria-hidden="true">
                        <span></span><span></span><span></span><span></span><span></span><span></span>
                      </span>
                      <span class="onb3v2-meta-inline-label">Meta diaria</span>
                    </span>
                  </span>
                  <span class="onb3v2-line onb3v2-line-bottom"><span>TU HIDRATACION</span></span>
                </h1>
              </div>

              <p class="onb3v2-copy">
                Cada vaso suma<br />
                a tu disciplina diaria.
              </p>

              <a class="onb3v2-btn" href="onboarding-4.html">
                <strong>CONTINUAR</strong>
                <span>Activa tu energia</span>
              </a>

              <div class="onb3v2-mini-dots" aria-hidden="true">
                <span></span><span></span><span></span><span class="active"></span><span></span><span></span><span></span><span></span>
              </div>
            </div>
          </div>
        </article>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
