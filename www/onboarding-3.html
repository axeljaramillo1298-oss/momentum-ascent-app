<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Listo | Momentum Ascent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      :root{--orange:#FF4500;--dark:#060608;--text:#f0ede8;--muted:rgba(240,237,232,.42);--border:rgba(255,255,255,.07)}
      *{box-sizing:border-box;margin:0;padding:0}
      body{background:var(--dark);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;position:relative;overflow-x:hidden}
      body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at top,rgba(255,69,0,.08),transparent 55%),radial-gradient(ellipse at bottom,rgba(255,69,0,.04),transparent 60%);pointer-events:none;z-index:0}
      body::after{content:"";position:fixed;inset:0;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:3px 3px;opacity:.4;pointer-events:none;z-index:0}
      .obw{max-width:540px;width:100%;text-align:center;position:relative;z-index:1;animation:fadeUp .55s ease both}
      @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
      .step-ind{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
      .step-ind .num{color:var(--orange)}
      .eyebrow{font-size:11px;font-weight:800;letter-spacing:.24em;text-transform:uppercase;color:var(--orange);margin-bottom:14px}
      .obw h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;font-size:clamp(40px,7vw,72px);text-transform:uppercase;line-height:.95;letter-spacing:-.02em;margin-bottom:14px}
      .obw h1 em{color:var(--orange);font-style:normal}
      .obw p.sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:28px;max-width:440px;margin-left:auto;margin-right:auto}
      .summary{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:28px;text-align:left;animation:fadeUp .55s ease .1s both}
      .summary-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;align-items:flex-start;line-height:1.5}
      .summary-row:last-child{border-bottom:none}
      .summary-row strong{font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-size:11px;min-width:96px;flex-shrink:0;padding-top:2px}
      .summary-row span{color:var(--text);font-weight:600}
      .btns{display:flex;flex-direction:column;gap:10px;align-items:stretch;margin-top:20px}
      .btn-p{padding:16px 28px;border-radius:4px;background:var(--orange);color:#fff;font:800 14px 'Barlow',sans-serif;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;transition:opacity .2s,transform .15s;display:block;text-align:center}
      .btn-p:hover{opacity:.92;transform:translateY(-1px)}
      .btn-g{padding:13px 24px;border-radius:4px;background:transparent;color:var(--muted);font:700 12px 'Barlow',sans-serif;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;border:1px solid var(--border);cursor:pointer;transition:all .15s;display:block;text-align:center}
      .btn-g:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
      .disc{margin-top:24px;font-size:10px;color:rgba(240,237,232,.25);line-height:1.6;letter-spacing:.04em}
      @media(max-width:520px){.summary-row{flex-direction:column;gap:2px}.summary-row strong{min-width:0}}
    </style>
  </head>
  <body>
    <main class="obw">
      <div class="step-ind"><span class="num">3</span> de 3 &mdash; Final</div>
      <div class="eyebrow">Listo</div>
      <h1>Tu perfil esta<br /><em>configurado</em></h1>
      <p class="sub">Ya podemos personalizar tus picks. Crea tu cuenta gratuita para acceder.</p>

      <div class="summary" id="summary">
        <div class="summary-row"><strong>Te interesa</strong><span id="sumSports">&mdash;</span></div>
        <div class="summary-row"><strong>Nivel</strong><span id="sumLevel">&mdash;</span></div>
        <div class="summary-row"><strong>Buscas</strong><span id="sumGoal">&mdash;</span></div>
      </div>

      <div class="btns">
        <a class="btn-p" href="registro.html">Crear cuenta gratis &rarr;</a>
        <a class="btn-g" href="index.html#picks">Ver picks de hoy</a>
        <a class="btn-g" href="onboarding-2.html">&larr; Editar respuestas</a>
      </div>
      <p class="disc">Contenido informativo. Apuesta con responsabilidad.</p>
    </main>
    <script>
      (function(){
        var STORAGE_KEY = 'ma_onboarding_prefs_v1';
        var SPORTS = {
          futbol: { e: '⚽', label: 'Futbol' },
          nba: { e: '🏀', label: 'NBA' },
          mlb: { e: '⚾', label: 'MLB' },
          ufc: { e: '🥊', label: 'UFC' },
          nfl: { e: '🏈', label: 'NFL' },
          tenis: { e: '🎾', label: 'Tenis' }
        };
        var LEVEL = {
          beginner: { e: '🌱', label: 'Empezando' },
          casual: { e: '📈', label: 'Casual' },
          regular: { e: '💼', label: 'Regular' }
        };
        var GOAL = {
          free_picks: { e: '🎯', label: 'Picks gratuitos' },
          learn: { e: '📚', label: 'Aprender analisis' },
          premium: { e: '💪', label: 'Picks premium' },
          parlays: { e: '🏔', label: 'Retos escalera' }
        };

        var prefs = null;
        try { prefs = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch(e) {}
        if (!prefs) prefs = { sports: [], level: null, goal: null };

        var sumSports = document.getElementById('sumSports');
        var sumLevel = document.getElementById('sumLevel');
        var sumGoal = document.getElementById('sumGoal');

        if (Array.isArray(prefs.sports) && prefs.sports.length) {
          sumSports.textContent = prefs.sports.map(function(k){
            var s = SPORTS[k]; return s ? (s.e + ' ' + s.label) : k;
          }).join(', ');
        } else {
          sumSports.textContent = 'Sin preferencia definida';
        }

        var lv = LEVEL[prefs.level];
        sumLevel.textContent = lv ? (lv.e + ' ' + lv.label) : 'Sin definir';

        var gl = GOAL[prefs.goal];
        sumGoal.textContent = gl ? (gl.e + ' ' + gl.label) : 'Sin definir';
      })();
    </script>
  </body>
</html>
