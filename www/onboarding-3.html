<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Paso 3 | Momentum Ascent</title>
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="onb-dark-body">
    <div class="noise"></div>
    <div class="stars"></div>
    <main class="onb-shell">
      <header class="onb-header">
        <a class="onb-back-btn" href="onboarding-2.html" aria-label="Atras"><</a>
        <div class="onb-progress-wrap"><div class="onb-progress-bar" style="width:33%"></div></div>
        <span class="onb-step-label">3/9</span>
      </header>
      <div class="onb-hero">
        <img src="assets/extras/extra-03.jpeg" data-female-src="assets/extras/extra-13.jpeg" alt="Lo que te frena" loading="eager" />
        <div class="onb-hero-overlay"></div>
        <div class="onb-hero-label"><h1>LO QUE<br />TE FRENA</h1><p>Identificalo para eliminarlo.</p></div>
      </div>
      <div class="onb-content">
        <p class="onb-eyebrow">Paso 3 - Barreras</p>
        <h1 class="onb-title">Que te ha impedido <span>ser constante?</span></h1>
        <p class="onb-sub">Selecciona todas las que apliquen. Es la base de tu plan.</p>
        <p class="onb-section-label">Que te frena mas? (puedes elegir varias)</p>
        <div class="onb-options grid-2" data-onb-key="barreras" data-onb-type="multi" data-onb-required="true">
          <button class="onb-option" type="button" data-onb-value="Falta de tiempo"><span class="onb-option-icon">⏰</span><span class="onb-option-label">Falta de tiempo</span></button>
          <button class="onb-option" type="button" data-onb-value="Falta de energia"><span class="onb-option-icon">⚡</span><span class="onb-option-label">Sin energia</span></button>
          <button class="onb-option" type="button" data-onb-value="Procrastinacion"><span class="onb-option-icon">📵</span><span class="onb-option-label">Procrastinacion</span></button>
          <button class="onb-option" type="button" data-onb-value="Ansiedad o estres"><span class="onb-option-icon">😤</span><span class="onb-option-label">Ansiedad / Estres</span></button>
          <button class="onb-option" type="button" data-onb-value="Sueno irregular"><span class="onb-option-icon">😴</span><span class="onb-option-label">Sueno irregular</span></button>
          <button class="onb-option" type="button" data-onb-value="No tengo plan claro"><span class="onb-option-icon">📋</span><span class="onb-option-label">Sin plan claro</span></button>
          <button class="onb-option" type="button" data-onb-value="Me desmotivo rapido"><span class="onb-option-icon">📉</span><span class="onb-option-label">Me desmotivo rapido</span></button>
          <button class="onb-option" type="button" data-onb-value="Alimentacion inconsistente"><span class="onb-option-icon">🍔</span><span class="onb-option-label">Comida inconsistente</span></button>
        </div>
        <p class="onb-section-label">Como es tu energia por las mananas?</p>
        <div class="onb-options grid-chips" data-onb-key="energia_manana" data-onb-type="single" data-onb-required="true">
          <button class="onb-option chip" type="button" data-onb-value="Muy baja">Muy baja</button>
          <button class="onb-option chip" type="button" data-onb-value="Baja">Baja</button>
          <button class="onb-option chip" type="button" data-onb-value="Normal">Normal</button>
          <button class="onb-option chip" type="button" data-onb-value="Alta">Alta</button>
          <button class="onb-option chip" type="button" data-onb-value="Lista para atacar">A tope</button>
        </div>
        <p class="reg-feedback onb-feedback" id="onbp-feedback-3" aria-live="polite"></p>
        <a class="onb-cta" href="onboarding-4.html" data-onb-next>CONTINUAR</a>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
